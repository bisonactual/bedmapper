name: Build macOS

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-macos:
    name: macOS ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-15
            rust_target: aarch64-apple-darwin
          - arch: intel
            runner: macos-15-intel
            rust_target: x86_64-apple-darwin

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Checkout private vision sidecar
        uses: actions/checkout@v5
        with:
          repository: ${{ github.repository_owner }}/bedmapper-vision
          path: src-native/bedmapper-vision
          ssh-key: ${{ secrets.BEDMAPPER_VISION_DEPLOY_KEY }}
          persist-credentials: false

      - name: Install Rust target
        run: rustup target add "${{ matrix.rust_target }}"

      - name: Install build dependencies
        run: brew install cmake ninja opencv dylibbundler

      - name: Build vision sidecar
        run: |
          cmake -S src-native/bedmapper-vision \
            -B src-native/bedmapper-vision/build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DOpenCV_DIR="$(brew --prefix opencv)/lib/cmake/opencv4"
          cmake --build src-native/bedmapper-vision/build

      - name: Inspect vision sidecar linkage
        run: |
          ls -lh src-native/bedmapper-vision/build/bedmapper-vision
          otool -L src-native/bedmapper-vision/build/bedmapper-vision

      - name: Install Tauri CLI
        run: npm install --global "@tauri-apps/cli@^2.0.0"

      - name: Build Tauri app
        run: tauri build --target "${{ matrix.rust_target }}"

      - name: Verify macOS bundle
        run: |
          app_path="$(find "target/${{ matrix.rust_target }}/release/bundle/macos" -maxdepth 1 -type d -name '*.app' | head -n 1)"
          if [ -z "$app_path" ]; then
            echo "No .app bundle found" >&2
            exit 1
          fi

          vision_dir="$app_path/Contents/Resources/resources/vision"
          sidecar="$vision_dir/bedmapper-vision"
          test -x "$sidecar"
          test -d "$vision_dir/lib"

          echo "Packaged vision files:"
          find "$vision_dir" -maxdepth 3 -type f -print -exec ls -lh {} \;

          dylib_count="$(find "$vision_dir/lib" -type f -name '*.dylib' | wc -l | tr -d ' ')"
          if [ "$dylib_count" = "0" ]; then
            echo "No OpenCV dylibs were bundled into $vision_dir/lib" >&2
            exit 1
          fi

          echo "Packaged sidecar linkage:"
          otool -L "$sidecar"

          for binary in "$sidecar" "$vision_dir"/lib/*.dylib; do
            if otool -L "$binary" | grep -E '/(opt/homebrew|usr/local)/(Cellar|opt)/'; then
              echo "Bundle still links to Homebrew path: $binary" >&2
              exit 1
            fi
          done

          echo "Verified $dylib_count bundled dylib(s)"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v5
        with:
          name: bedmapper-macos-${{ matrix.arch }}
          path: |
            target/${{ matrix.rust_target }}/release/bundle/macos/*.app
            target/${{ matrix.rust_target }}/release/bundle/dmg/*.dmg
          if-no-files-found: error

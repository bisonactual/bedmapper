name: Build macOS

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-macos:
    name: macOS ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-15
            rust_target: aarch64-apple-darwin
          - arch: intel
            runner: macos-15-intel
            rust_target: x86_64-apple-darwin

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Checkout private vision sidecar
        uses: actions/checkout@v5
        with:
          repository: ${{ github.repository_owner }}/bedmapper-vision
          path: src-native/bedmapper-vision
          ssh-key: ${{ secrets.BEDMAPPER_VISION_DEPLOY_KEY }}
          persist-credentials: false

      - name: Install Rust target
        run: rustup target add "${{ matrix.rust_target }}"

      - name: Install build dependencies
        run: brew install cmake ninja opencv dylibbundler

      - name: Build vision sidecar
        run: |
          cmake -S src-native/bedmapper-vision \
            -B src-native/bedmapper-vision/build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DOpenCV_DIR="$(brew --prefix opencv)/lib/cmake/opencv4"
          cmake --build src-native/bedmapper-vision/build

      - name: Bundle vision sidecar resources
        run: |
          rm -rf src-tauri/resources/vision
          mkdir -p src-tauri/resources/vision
          cp src-native/bedmapper-vision/build/bedmapper-vision src-tauri/resources/vision/
          dylibbundler \
            -od \
            -b \
            -x src-tauri/resources/vision/bedmapper-vision \
            -d src-tauri/resources/vision \
            -p "@executable_path/"
          chmod +x src-tauri/resources/vision/bedmapper-vision

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0.0" --locked

      - name: Build Tauri app
        run: cargo tauri build --target "${{ matrix.rust_target }}"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v5
        with:
          name: bedmapper-macos-${{ matrix.arch }}
          path: |
            target/${{ matrix.rust_target }}/release/bundle/macos/*.app
            target/${{ matrix.rust_target }}/release/bundle/dmg/*.dmg
          if-no-files-found: error
